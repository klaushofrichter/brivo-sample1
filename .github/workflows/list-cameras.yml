name: list-cameras

on:
  pull_request:
    branches: [production]

jobs:
  list-cameras:
    runs-on: ubuntu-latest
    env:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      HTTPS_BASE_URL: ${{ secrets.HTTPS_BASE_URL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run list-cameras.js and verify cameras present
        run: |
          set -o pipefail
          if [[ -z "$ACCESS_TOKEN" || -z "$HTTPS_BASE_URL" ]]; then
            echo "::error::ACCESS_TOKEN / HTTPS_BASE_URL secrets are not set — run the local pre-push hook to populate them"
            exit 1
          fi
          output=$(node list-cameras.js | tee /dev/stderr)
          count=$(printf '%s\n' "$output" | sed -n 's/^Found \([0-9][0-9]*\) camera(s):.*/\1/p')
          if [[ -z "$count" ]]; then
            echo "::error::could not parse camera count from output"
            exit 1
          fi
          if [[ "$count" -lt 1 ]]; then
            echo "::error::expected at least one camera, got $count"
            exit 1
          fi
          echo "ok: $count camera(s) listed"

      - name: Run list-users.js and verify users present
        run: |
          set -o pipefail
          output=$(node list-users.js | tee /dev/stderr)
          count=$(printf '%s\n' "$output" | sed -n 's/^Found \([0-9][0-9]*\) user(s):.*/\1/p')
          if [[ -z "$count" ]]; then
            echo "::error::could not parse user count from output"
            exit 1
          fi
          if [[ "$count" -lt 1 ]]; then
            echo "::error::expected at least one user, got $count"
            exit 1
          fi
          echo "ok: $count user(s) listed"
