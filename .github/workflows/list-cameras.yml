name: list-cameras

on:
  pull_request:
    branches: [production]

jobs:
  list-cameras:
    runs-on: ubuntu-latest
    env:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      HTTPS_BASE_URL: ${{ secrets.HTTPS_BASE_URL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci --omit=dev

      - name: Verify EEN listings return at least one item
        run: |
          set -o pipefail
          if [[ -z "$ACCESS_TOKEN" || -z "$HTTPS_BASE_URL" ]]; then
            echo "::error::ACCESS_TOKEN / HTTPS_BASE_URL secrets are not set — run the local pre-push hook to populate them"
            exit 1
          fi

          check() {
            local script="$1" noun="$2"
            local output count
            output=$(node "$script" | tee /dev/stderr)
            count=$(printf '%s\n' "$output" | sed -n "s/^Found \([0-9][0-9]*\) ${noun}(s):.*/\1/p")
            if [[ -z "$count" ]]; then
              echo "::error::could not parse ${noun} count from $script output"
              return 1
            fi
            if [[ "$count" -lt 1 ]]; then
              echo "::error::expected at least one ${noun}, got $count"
              return 1
            fi
            echo "ok: $count ${noun}(s) listed"
          }

          check list-cameras.js camera
          check list-users.js   user
